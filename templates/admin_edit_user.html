{% extends "base.html" %}

{% block title %}编辑用户 - Flask登录系统{% endblock %}

{% block content %}
<div class="admin-container">
    <div class="admin-header">
        <h1>✏️ 编辑用户: {{ user.username }}</h1>
        <a href="{{ url_for('admin.users') }}" class="btn btn-secondary">← 返回用户列表</a>
    </div>

    <div class="form-card">
        <form method="POST" class="admin-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    value="{{ user.username }}" 
                    readonly
                    disabled
                >
                <small>用户名不能修改</small>
            </div>

            <div class="form-group">
                <label for="email">邮箱 *</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    value="{{ user.email }}" 
                    placeholder="请输入邮箱地址" 
                    required
                >
            </div>

            <div class="form-group">
                <label for="new_password">新密码（留空表示不修改）</label>
                <input 
                    type="password" 
                    id="new_password" 
                    name="new_password" 
                    placeholder="请输入新密码（至少6位）" 
                    minlength="6"
                >
            </div>

            <div class="form-group">
                <label for="role">角色 *</label>
                <select id="role" name="role" required>
                    <option value="user" {% if user.is_user() %}selected{% endif %}>普通用户</option>
                    <option value="admin" {% if user.is_admin() %}selected{% endif %}>管理员</option>
                </select>
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-primary">✓ 保存修改</button>
                <a href="{{ url_for('admin.users') }}" class="btn btn-secondary">✕ 取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
