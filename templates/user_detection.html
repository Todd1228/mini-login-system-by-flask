{% extends "base.html" %}

{% block title %}AI 目标检测 - Flask登录系统{% endblock %}

{% block content %}
<div class="profile-container">
    <div class="profile-header">
        <h1>🔍 AI 实时目标检测</h1>
        <p>基于 YOLOv8 的实时物体识别演示</p>
    </div>

    <div class="detection-layout">
        <div class="camera-card">
            <div class="video-wrapper">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas"></canvas>
            </div>
            
            <div class="controls">
                <button id="start-btn" class="btn btn-primary">▶️ 开始检测</button>
                <button id="stop-btn" class="btn btn-danger" disabled>⏹️ 停止检测</button>
                <div id="status" class="status-indicator">
                    <span class="dot"></span>
                    <span id="status-text">摄像头未就绪</span>
                </div>
            </div>
        </div>

        <div class="info-card">
            <h2>📝 检测说明</h2>
            <div class="detection-tips">
                <ul>
                    <li>点击 <strong>开始检测</strong> 授权并启动摄像头。</li>
                    <li>系统将实时识别摄像头画面中的物体（人、手机、书本等）。</li>
                    <li>本功能直接调用后端的 YOLOv8 模型进行处理。</li>
                </ul>
            </div>
            
            <div class="results-panel">
                <h3>当前物体:</h3>
                <div id="labels-list" class="labels-container">
                    <!-- 动态插入检测到的标签 -->
                    <p class="empty-msg">等待检测...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
/* AI 检测页面专属样式 */
.detection-layout {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
    margin-top: 20px;
}

.camera-card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
}

.video-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 4 / 3;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 20px;
}

#video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1); /* 镜像显示 */
}

#canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    transform: scaleX(-1); /* 镜像显示 */
}

.controls {
    display: flex;
    gap: 15px;
    align-items: center;
}

.status-indicator {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #666;
}

.dot {
    width: 10px;
    height: 10px;
    background: #ccc;
    border-radius: 50%;
}

.dot.active {
    background: #4ecdc4;
    box-shadow: 0 0 8px #4ecdc4;
}

.info-card {
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
}

.info-card h2 {
    font-size: 20px;
    color: #667eea;
    margin-bottom: 15px;
}

.detection-tips ul {
    padding-left: 20px;
    color: #666;
    font-size: 14px;
}

.results-panel {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 2px solid #f0f0f0;
}

.results-panel h3 {
    font-size: 16px;
    margin-bottom: 10px;
    color: #333;
}

.labels-container {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.ai-label {
    background: #f0f4ff;
    color: #667eea;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
}

.empty-msg {
    color: #999;
    font-style: italic;
}

@media (max-width: 768px) {
    .detection-layout {
        grid-template-columns: 1fr;
    }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const statusText = document.getElementById('status-text');
    const statusDot = document.querySelector('.dot');
    const labelsList = document.getElementById('labels-list');
    
    let stream = null;
    let detectionActive = false;
    let detectionTimer = null;
    
    // 初始化摄像头
    async function initCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 640, height: 480 } 
            });
            video.srcObject = stream;
            statusText.textContent = '摄像头已连接';
            statusDot.classList.add('active');
            return true;
        } catch (err) {
            console.error("Camera error:", err);
            statusText.textContent = '无法访问摄像头';
            return false;
        }
    }
    
    // 开始检测循环
    async function startDetection() {
        if (!stream) {
            const ready = await initCamera();
            if (!ready) return;
        }
        
        detectionActive = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        statusText.textContent = '实时检测中...';
        
        detectionLoop();
    }
    
    // 停止检测
    function stopDetection() {
        detectionActive = false;
        startBtn.disabled = false;
        stopBtn.disabled = true;
        statusText.textContent = '检测已停止';
        
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.width);
        labelsList.innerHTML = '<p class="empty-msg">等待检测...</p>';
    }
    
    // 检测主循环
    async function detectionLoop() {
        if (!detectionActive) return;
        
        // 设置画布大小与视频匹配
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = video.videoWidth;
        tempCanvas.height = video.videoHeight;
        const ctx = tempCanvas.getContext('2d');
        ctx.drawImage(video, 0, 0, video.videoWidth, video.videoHeight);
        
        // 转换为 base64 图片数据
        const imageData = tempCanvas.toDataURL('image/jpeg', 0.7);
        
        try {
            const response = await fetch("{{ url_for('user.process_frame') }}", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ image: imageData })
            });
            
            const data = await response.json();
            if (data.detections) {
                drawResults(data.detections);
                updateLabels(data.detections);
            }
        } catch (err) {
            console.error("Detection API error:", err);
        }
        
        // 约每秒 10 帧 (100ms 间隔)
        if (detectionActive) {
            setTimeout(detectionLoop, 100);
        }
    }
    
    // 绘制检测框
    function drawResults(detections) {
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#4ecdc4";
        ctx.font = "18px sans-serif";
        ctx.fillStyle = "#4ecdc4";
        
        detections.forEach(det => {
            const [x1, y1, x2, y2] = det.bbox;
            const w = x2 - x1;
            const h = y2 - y1;
            
            // 绘制矩形
            ctx.strokeRect(x1, y1, w, h);
            
            // 绘制标签背景
            const text = `${det.label} ${Math.round(det.confidence * 100)}%`;
            const textWidth = ctx.measureText(text).width;
            ctx.fillRect(x1, y1 - 25, textWidth + 10, 25);
            
            // 绘制标签文字
            ctx.fillStyle = "white";
            ctx.fillText(text, x1 + 5, y1 - 7);
            ctx.fillStyle = "#4ecdc4"; // 恢复画笔颜色
        });
    }
    
    // 更新侧边栏标签列表
    function updateLabels(detections) {
        if (detections.length === 0) {
            labelsList.innerHTML = '<p class="empty-msg">未发现物体</p>';
            return;
        }
        
        const labels = [...new Set(detections.map(d => d.label))];
        labelsList.innerHTML = labels.map(l => `<span class="ai-label">${l}</span>`).join('');
    }
    
    startBtn.addEventListener('click', startDetection);
    stopBtn.addEventListener('click', stopDetection);
});
</script>
{% endblock %}
